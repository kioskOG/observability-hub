grafana:
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-auth-secrets
        key: GRAFANA_OAUTH_CLIENT_SECRET

  grafana.ini:
    server:
      # Production public URL (must match Keycloak valid_redirect_uris).
      # Dev port-forward: temporarily use http://localhost:3000/ — see Docs/Grafana-SSO-Production.md §5.
      root_url: https://grafana.jatinog.com/
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      client_id: ${grafana_oidc_client_id}
      scopes: "openid email profile offline_access roles"
      auth_url: ${grafana_oidc_auth_url}
      token_url: ${grafana_oidc_token_url}
      api_url: ${grafana_oidc_api_url}
      signout_redirect_url: ${grafana_oidc_logout_url}
      use_refresh_token: true
      use_pkce: true

      allow_sign_up: true
      allow_assign_grafana_admin: true
      role_attribute_strict: true

      login_attribute_path: preferred_username
      name_attribute_path: name
      email_attribute_path: email
      groups_attribute_path: groups

      role_attribute_path: >-
        contains(resource_access["grafana-oauth"].roles[*], 'admin') && 'GrafanaAdmin'
        || contains(roles[*], 'admin') && 'GrafanaAdmin'
        || contains(resource_access["grafana-oauth"].roles[*], 'editor') && 'Editor'
        || contains(roles[*], 'editor') && 'Editor'
        || contains(resource_access["grafana-oauth"].roles[*], 'viewer') && 'Viewer'
        || contains(roles[*], 'viewer') && 'Viewer'
