# Credentials for Alloy -> Loki gateway (basic auth) and Mimir remote_write.
# Match loki_gateway_* to a user/password that exists in loki/.htpasswd (Loki nginx gateway).
# Apply: make apply-alloy-manifests   (or make init / make install-alloy)
apiVersion: v1
kind: Secret
metadata:
  name: alloy-remote-credentials
  namespace: alloy-logs
type: Opaque
stringData:
  loki_gateway_username: "loki-canary"
  loki_gateway_password: "loki-canary"
  mimir_remote_write_username: "mimir-nginx"
  mimir_remote_write_password: "mimir-nginx"
