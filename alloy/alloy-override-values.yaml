
# -- Kafka Feature Toggle (River components gated via tpl in alloy.configMap.content).
# KAFKA_* env vars below use YAML anchors so broker/topic/clientId stay in sync.
# Unused when enabled=false; set enabled=true to tee logs to Kafka.
kafka:
  enabled: false
  brokers: &kafka_brokers "my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  topic: &kafka_topic "alloy-otel-logs"
  clientId: &kafka_client_id "grafana-alloy-logs"

# -- Overrides the chart's namespace.
namespaceOverride: null

crds:
  # -- Whether to install CRDs for monitoring.
  create: true

## Various Alloy settings. For backwards compatibility with the grafana-agent
## chart, this field may also be called "agent". Naming this field "agent" is
## deprecated and will be removed in a future release.
alloy:
  extraPorts:
    - name: otlp-grpc # The default port for otlp-grpc is 4317, so you need to add this port to the service related to your alloy instance
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http # The default port for otlp-http is 4318, so you need to add this port to the service related to your alloy instance
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: pyroscope
      port: 4041
      targetPort: 4041
      protocol: TCP
    # Grafana Faro Web SDK (RUM) → otelcol.receiver.faro
    - name: faro
      port: 12347
      targetPort: 12347
      protocol: TCP
  configMap:
    # -- Create a new ConfigMap for the config file.
    create: true
    # -- Content to assign to the new ConfigMap.  This is passed into `tpl` allowing for templating from values.
    content: |
      // Multi-tenant Loki: tenant = Kubernetes namespace for pod logs & events; fixed tenants for platform/syslog/journal, alloy-logs, and OTLP span logs ("traces").
      // Requires loki.auth_enabled=true and credentials in Secret alloy-remote-credentials (see alloy-override-values.yaml).
      // Optional Kafka export (OTLP protobuf): set kafka.enabled=true in alloy-override-values.yaml to tee log streams to KAFKA_TOPIC via otelcol.exporter.kafka; Loki still receives the same streams directly.
      discovery.kubernetes "pods" {
        role = "pod"

      // https://grafana.com/docs/alloy/latest/collect/prometheus-metrics/
      // this demonstrates configuring Alloy to collect data (metrics or logs) from running production Kubernetes Pods in the default Namespace.
      //  namespaces {
      //    own_namespace = false
      //    names = ["default"]
      //  }
      //  selectors {
      //    role  = "pod"
      //    label = "environment in (production)"
      //  }
      }
      // Pods on this node only — required for pyroscope.ebpf (profiles processes on this host; avoids huge cluster-wide target lists).
      discovery.kubernetes "pods_node_local" {
        role = "pod"
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + coalesce(sys.env("KUBE_NODE_NAME"), sys.env("HOSTNAME"))
        }
      }
      discovery.relabel "ebpf_targets" {
        targets = discovery.kubernetes.pods_node_local.targets
        rule {
          action        = "drop"
          regex         = "Succeeded|Failed|Completed|Pending"
          source_labels = ["__meta_kubernetes_pod_phase"]
        }
        rule {
          action        = "replace"
          regex         = "(.*)@(.*)"
          replacement   = "ebpf/${1}/${2}"
          separator     = "@"
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          target_label  = "service_name"
        }
        rule {
          action = "labelmap"
          regex  = "__meta_kubernetes_pod_label_(.+)"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
      }
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          action        = "replace"
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "job"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          target_label  = "node"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          action        = "replace"
          replacement   = "/var/log/pods/*$1/*.log"
          target_label  = "__path__"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_pod_container_id"]
          regex         = "^(\\\\w+):\\/\\/.+$"
          replacement   = "$1"
          target_label  = "tmp_container_runtime"
        }
        // Drop pods in terminal phases to reduce noise & resource usage
        rule {
          action        = "drop"
          regex         = "Succeeded|Failed|Completed"
          source_labels = ["__meta_kubernetes_pod_phase"]
        }
      }
      // configuring Alloy to collect its own telemetry and forward it to the mimir backend.
      prometheus.exporter.self "default" {}
      prometheus.scrape "metamonitoring" {
        targets    = prometheus.exporter.self.default.targets
        forward_to = [prometheus.remote_write.mimir.receiver]
      }
      loki.process "alloy_internal_logs" {
        stage.tenant { value = "alloy-logs" }
        forward_to = [loki.write.loki.receiver{{- if .Values.kafka.enabled }}, otelcol.receiver.loki.kafka_bridge.receiver{{- end }}]
      }
      logging {
        level    = "info"
        format   = "json"
        write_to = [loki.process.alloy_internal_logs.receiver]
      }
      // tracing {
      //  sampling_fraction = 0.1
      //  write_to          = [otelcol.exporter.otlp.tempo.input]
      // }
      // System or Node logs
      // local.file_match discovers files on the local filesystem using glob patterns and the doublestar library. It returns an array of file paths.
      local.file_match "node_logs" {
        path_targets = [{
            // Monitor syslog to scrape node-logs
            __path__  = "/var/log/syslog",
            job       = "node/syslog",
            node_name = sys.env("HOSTNAME"),
            cluster     = sys.env("KUBE_CLUSTER_NAME"),
            environment = sys.env("ENVIRONMENT_NAME"),
            region      = sys.env("AWS_REGION"),
            cloud       = sys.env("CLOUD_PROVIDER"),
            platform    = sys.env("PLATFORM_TYPE"),
            node        = sys.env("KUBE_NODE_NAME"),
        }]
      }
      loki.process "node_syslog_tenant" {
        stage.tenant { value = "platform" }
        forward_to = [loki.write.loki.receiver{{- if .Values.kafka.enabled }}, otelcol.receiver.loki.kafka_bridge.receiver{{- end }}]
      }
      // loki.source.file reads log entries from files and forwards them to other loki.* components.
      loki.source.file "node_logs" {
        targets    = local.file_match.node_logs.targets
        forward_to = [loki.process.node_syslog_tenant.receiver]
      }
      // Node journald logs from Amazon Linux 2 (EKS)
      loki.relabel "journal" {
        forward_to = [loki.write.loki.receiver]
        rule {
          action = "labelmap"
          regex  = "__journal__(.+)"
        }
        rule {
          action         = "replace"
          source_labels = ["__journal__systemd_unit"]
          replacement    = "$1"
          target_label   = "unit"
        }
        rule {
          action         = "replace"
          source_labels = ["__journal__systemd_unit"]
          replacement    = "$1"
          target_label   = "service_name"
        }
      }
      loki.source.journal "node_logs" {
        path           = "/var/log/journal" // path inside the Alloy pod
        format_as_json = true
        max_age        = "12h"
        relabel_rules  = loki.relabel.journal.rules
        forward_to     = [loki.process.node_logs.receiver]
        labels = {
          job         = "node/journal",
          instance    = sys.env("HOSTNAME"),
          cluster     = sys.env("KUBE_CLUSTER_NAME"),
          environment = sys.env("ENVIRONMENT_NAME"),
          region      = sys.env("AWS_REGION"),
          cloud       = sys.env("CLOUD_PROVIDER"),
          platform    = sys.env("PLATFORM_TYPE"),
          node        = sys.env("KUBE_NODE_NAME"),
        }
      }
      loki.process "node_logs" {
        stage.static_labels {
          values = {
            source = "journal",
            level  = "unknown",
          }
        }
        stage.match {
          selector = "{level=\"unknown\"} |~ \"([IWED][0-9]{4}\\\\s+[0-9]{2}:[0-9]{2}:[0-9]{2}\\\\.[0-9]+)\""
          stage.regex {
            expression = "((?P<level>[A-Z])[0-9])"
          }
          stage.replace {
            source     = "level"
            expression = "(I)"
            replace    = "INFO"
          }
          stage.replace {
            source     = "level"
            expression = "(W)"
            replace    = "WARN"
          }
          stage.replace {
            source     = "level"
            expression = "(E)"
            replace    = "ERROR"
          }
          stage.replace {
            source     = "level"
            expression = "(D)"
            replace    = "DEBUG"
          }
          stage.labels {
            values = {
              level = "",
            }
          }
        }
        stage.match {
          selector = "{level=\"unknown\"}"
          stage.regex {
            expression = "(?i)(?:\\\"(?:level|loglevel|levelname|lvl|SeverityText)\\\":\\s*\\\"|\\s*(?:level|loglevel|lvl)=\\\"?|\\s+\\[?)(?P<level>(DEBUG?|INFO|WARN|ERROR|TRACE|FATAL))(\\\"|\\s+|-|\\s*\\])"
          }
          stage.labels {
            values = {
              level = "",
            }
          }
        }
        stage.label_keep {
          values = [
            "cluster",
            "environment",
            "region",
            "platform",
            "node",
            "instance",
            "service_name",
            "unit",
            "job",
            "level",
            "source",
          ]
        }
        stage.tenant { value = "platform" }
        forward_to = [loki.write.loki.receiver{{- if .Values.kafka.enabled }}, otelcol.receiver.loki.kafka_bridge.receiver{{- end }}]
      }
      // Pods logs
      local.file_match "pod_logs" {
        path_targets = discovery.relabel.pod_logs.output
      }
      loki.source.file "pod_logs" {
        targets    = local.file_match.pod_logs.targets
        forward_to = [loki.process.pod_logs.receiver]
      }
      // Kubernetes Cluster Events
      loki.source.kubernetes_events "cluster_events" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "json"
        forward_to = [loki.process.cluster_events.receiver]
      }
      loki.process "pod_logs" {
        stage.static_labels {
          values = {
            cluster     = sys.env("KUBE_CLUSTER_NAME"),
            environment = sys.env("ENVIRONMENT_NAME"),
            region      = sys.env("AWS_REGION"),
            cloud       = sys.env("CLOUD_PROVIDER"),
            platform    = sys.env("PLATFORM_TYPE"),
            node        = sys.env("KUBE_NODE_NAME"),
          }
        }
        stage.match {
          selector = "{tmp_container_runtime=\"containerd\"}"
          stage.cri {}
          stage.labels {
            values = {
              flags  = "",
              stream = "",
            }
          }
        }
        stage.match {
          selector = "{tmp_container_runtime=\"docker\"}"
          stage.docker {}
          stage.labels {
            values = {
              stream = "",
            }
          }
        }
        stage.label_drop {
          values = ["tmp_container_runtime"]
        }
        stage.match {
          selector = "{namespace=~\"(monitoring|default|loki|mimir)\"}"
          stage.regex {
            expression = "(?P<method>GET|PUT|DELETE|POST)"
          }
          stage.regex {
            expression = "(?P<status_code_with_http_version>HTTP.{6}\\d{3})"
          }
          stage.regex {
            expression = "(?P<status_code>\\d{3})"
            source     = "status_code_with_http_version"
          }
          stage.labels {
            values = {
              method      = "",
              status_code = "",
            }
          }
        }
        stage.json {
          expressions = {
            level   = "level",
            app     = "app",
            env     = "env",
            message = "message",
          }
        }
        stage.regex {
          expression = "(?:trace_id|TraceID|traceID)[^a-zA-Z0-9]*(?P<trace_id>[0-9a-fA-F]{32})|(?:span_id|SpanID|spanID)[^a-zA-Z0-9]*(?P<span_id>[0-9a-fA-F]{16})"
        }
        stage.structured_metadata {
          values = {
            trace_id = "trace_id",
            span_id  = "span_id",
          }
        }
        stage.tenant {
          label = "namespace"
        }
        forward_to = [loki.write.loki.receiver{{- if .Values.kafka.enabled }}, otelcol.receiver.loki.kafka_bridge.receiver{{- end }}]
      }
      loki.process "cluster_events" {
        stage.static_labels {
          values = {
            cluster     = sys.env("KUBE_CLUSTER_NAME"),
            environment = sys.env("ENVIRONMENT_NAME"),
            region      = sys.env("AWS_REGION"),
          }
        }
        stage.replace {
          expression = "(\"type\":\"Normal\")"
          replace = "\"type\":\"Normal\",\"level\":\"info\""
        }
        stage.replace {
          expression = "(\"type\":\"Warning\")"
          replace = "\"type\":\"Warning\",\"level\":\"warning\""
        }
        stage.json {
          expressions = {
            k8s_resource_kind = "kind",
            k8s_resource_name = "name",
            k8s_event_reason  = "reason",
            k8s_event_message = "message",
            k8s_event_type    = "type",
            k8s_namespace_name = "namespace",
          }
        }
        stage.replace {
          source     = "k8s_namespace_name"
          expression = "^$"
          replace    = "cluster"
        }
        stage.labels {
          values = {
            k8s_namespace_name = "k8s_namespace_name",
            k8s_resource_kind  = "k8s_resource_kind",
            k8s_event_reason   = "k8s_event_reason",
            k8s_event_type     = "k8s_event_type",
            k8s_resource_name  = "k8s_resource_name",
          }
        }
        stage.structured_metadata {
          values = {
            k8s_resource_name = "k8s_resource_name",
            k8s_event_message = "k8s_event_message",
          }
        }
        stage.label_keep {
          values = ["cluster", "environment", "region", "job", "k8s_namespace_name", "k8s_resource_kind", "k8s_event_reason", "k8s_event_type"]
        }
        stage.tenant {
          label = "k8s_namespace_name"
        }
        forward_to = [loki.write.loki.receiver{{- if .Values.kafka.enabled }}, otelcol.receiver.loki.kafka_bridge.receiver{{- end }}]
      }
      {{- if .Values.kafka.enabled }}
      // --- Kafka (OTLP logs on KAFKA_TOPIC) ---
      // Pod / node / events / Alloy internal logs: tee to Loki (direct) and to Kafka (OTLP protobuf) for streaming or downstream consumers.
      // KAFKA_BROKERS is comma-separated, for example: "kafka-0.kafka.svc:9092,kafka-1.kafka.svc:9092"
      // Optional auth/TLS: set in Helm extraEnv and extend otelcol.exporter.kafka with authentication { sasl { ... } } and tls { ... } blocks.
      otelcol.exporter.kafka "to_kafka" {
        protocol_version = "2.0.0"
        brokers   = string.split(sys.env("KAFKA_BROKERS"), ",")
        client_id = coalesce(sys.env("KAFKA_CLIENT_ID"), "grafana-alloy-logs")
        // Per-request produce timeout; undersized values contribute to failures and an open exporter circuit breaker.
        timeout = "30s"
        logs {
          topic    = sys.env("KAFKA_TOPIC")
          encoding = "otlp_proto"
        }
        // Producer limit must fit the broker (often ~1MiB default). Cap OTLP batch size with otelcol.processor.batch send_batch_* (this Alloy build has no sending_queue.batch).
        producer {
          max_message_bytes = 1048576
          compression       = "snappy"
        }
        sending_queue {
          block_on_overflow = true
          queue_size        = 2000
        }
        retry_on_failure {
          enabled          = true
          initial_interval = "2s"
          max_interval       = "60s"
          max_elapsed_time   = "0s"
          multiplier         = 1.8
        }
      }
      otelcol.processor.batch "logs_to_kafka" {
        timeout               = "3s"
        send_batch_size       = 200
        send_batch_max_size   = 200
        output {
          logs = [otelcol.exporter.kafka.to_kafka.input]
        }
      }
      otelcol.receiver.loki "kafka_bridge" {
        output {
          logs = [otelcol.processor.batch.logs_to_kafka.input]
        }
      }
      {{- end }}
      loki.write "loki" {
        endpoint {
          url = "http://loki-gateway.loki.svc.cluster.local/loki/api/v1/push"
          basic_auth {
            username = sys.env("LOKI_GATEWAY_USERNAME")
            password = sys.env("LOKI_GATEWAY_PASSWORD")
          }
        }
        external_labels = {
            cluster     = sys.env("KUBE_CLUSTER_NAME"),
            environment = sys.env("ENVIRONMENT_NAME"),
            region      = sys.env("AWS_REGION"),
            cloud       = sys.env("CLOUD_PROVIDER"),
            platform    = sys.env("PLATFORM_TYPE"),
            node        = sys.env("KUBE_NODE_NAME"),
            }
      }
      // --- OTLP pipeline with EKS resource detection ---
      otelcol.processor.resourcedetection "eks" {
        detectors = ["eks"]
        output {
          traces  = [otelcol.processor.k8sattributes.default.input]
          metrics = [otelcol.processor.k8sattributes.default.input]
        }
      }
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {}
        output {
          traces  = [otelcol.processor.resourcedetection.eks.input]
          metrics = [otelcol.processor.resourcedetection.eks.input]
        }
      }
      otelcol.processor.k8sattributes "default" {
        extract {
          metadata = [
            "k8s.namespace.name",
            "k8s.node.name",
            "k8s.pod.name",
            "k8s.container.name",
            "k8s.deployment.name",
            "k8s.statefulset.name",
            "k8s.daemonset.name",
            "k8s.cronjob.name",
            "container.id",
            "container.image.tag",
            "container.image.name",
            "k8s.pod.start_time",
          ]
        }
        output {
          traces  = [
            otelcol.processor.batch.default.input,
            otelcol.connector.spanlogs.default.input,
            otelcol.connector.spanmetrics.default.input,
            otelcol.connector.servicegraph.default.input,
          ]
          metrics = [otelcol.processor.batch.default.input]
        }
      }
      // https://grafana.com/docs/tempo/latest/configuration/grafana-alloy/span-metrics/#generate-metrics-from-spans
      otelcol.connector.spanmetrics "default" {
        dimension {
          name    = "http.method"
          default = "GET"
        }
        dimension {
          name = "http.target"
        }
        aggregation_temporality = "DELTA"
        histogram {
          explicit {
            buckets = ["50ms", "100ms", "250ms", "1s", "5s", "10s"]
          }
        }
        metrics_flush_interval = "15s"
        namespace              = "traces.spanmetrics"
        resource_metrics_key_attributes = ["service.name", "telemetry.sdk.language", "telemetry.sdk.name"]
        output {
          metrics = [otelcol.exporter.prometheus.default.input]
        }
      }
      otelcol.connector.servicegraph "default" {
        dimensions = ["http.method", "http.target", "service.name"]
        database_name_attributes = ["db.name"]
        latency_histogram_buckets = ["2ms", "4ms", "6ms", "8ms", "10ms", "50ms", "100ms", "200ms", "400ms", "800ms", "1s", "1400ms", "2s", "5s", "10s", "15s"]
        metrics_flush_interval = "15s"
        output {
          metrics = [otelcol.exporter.prometheus.default.input]
        }
      }
      otelcol.processor.batch "default" {
        timeout               = "5s"
        send_batch_size       = 10000
        send_batch_max_size   = 10000
        output {
          traces  = [otelcol.exporter.otlp.tempo.input]
          metrics = [otelcol.exporter.prometheus.default.input]
        }
      }
      otelcol.exporter.prometheus "default" {
        forward_to = [prometheus.remote_write.mimir.receiver]
      }
      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-nginx.mimir.svc.cluster.local/api/v1/push"
          basic_auth {
            username = sys.env("MIMIR_REMOTE_WRITE_USERNAME")
            password = sys.env("MIMIR_REMOTE_WRITE_PASSWORD")
          }
          // Ease transient backpressure / slow nginx without resharding falling behind as aggressively.
          queue_config {
            capacity           = 20000
            max_samples_per_send = 3000
            batch_send_deadline  = "8s"
            min_backoff          = "50ms"
            max_backoff          = "15s"
          }
        }
        external_labels = {
            cluster     = sys.env("KUBE_CLUSTER_NAME"),
            environment = sys.env("ENVIRONMENT_NAME"),
            region      = sys.env("AWS_REGION"),
            cloud       = sys.env("CLOUD_PROVIDER"),
            platform    = sys.env("PLATFORM_TYPE"),
            node        = sys.env("KUBE_NODE_NAME"),
            }
      }
      {{- if .Values.kafka.enabled }}
      otelcol.processor.batch "spanlogs_to_kafka" {
        timeout               = "3s"
        send_batch_size       = 128
        send_batch_max_size   = 128
        output {
          logs = [otelcol.exporter.kafka.to_kafka.input]
        }
      }
      {{- end }}
      otelcol.exporter.loki "spanlogs_to_loki" {
        forward_to = [loki.write.loki.receiver]
      }
      otelcol.connector.spanlogs "default" {
        roots           = true
        span_attributes = ["http.method", "http.target"]
        labels = ["trace_id", "span_id", "service.name"]
        output {
          logs = [otelcol.processor.attributes.spanlogs_loki_metadata.input]
        }
      }
      otelcol.processor.attributes "spanlogs_loki_metadata" {
        action {
          key    = "loki.resource.labels"
          action = "insert"
          value  = "k8s.namespace.name"
        }
        output {
          logs = [
            {{- if .Values.kafka.enabled }}otelcol.processor.batch.spanlogs_to_kafka.input,{{- end }}
            otelcol.exporter.loki.spanlogs_to_loki.input,
          ]
        }
      }
      // Span-derived logs: always to Loki; tee to Kafka when kafka.enabled=true.
      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo-distributor.tempo.svc.cluster.local:4317"
          tls {
            insecure = true
            insecure_skip_verify = true
          }
        }
      }
      // --- Grafana Faro (RUM) ---
      // Browser Faro Web SDK → Alloy → Tempo (traces) + Loki (logs/events).
      // Expose Service port 12347 (and Ingress if browsers are outside the cluster).
      // Requires alloy.stabilityLevel: experimental and Alloy >= v1.10.0 (chart >= 1.2.0).
      otelcol.receiver.faro "rum" {
        endpoint = "0.0.0.0:12347"
        cors {
          // Tighten to your app origins in production (e.g. https://app.example.com).
          allowed_origins = ["*"]
          allowed_headers = ["*"]
          max_age         = 7200
        }
        output {
          logs   = [otelcol.processor.batch.faro.input]
          traces = [otelcol.processor.batch.faro.input]
        }
      }
      otelcol.processor.batch "faro" {
        timeout             = "5s"
        send_batch_size     = 512
        send_batch_max_size = 1024
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
          logs   = [otelcol.exporter.loki.faro_to_loki.input]
        }
      }
      otelcol.exporter.loki "faro_to_loki" {
        forward_to = [loki.process.faro_tenant.receiver]
      }
      loki.process "faro_tenant" {
        stage.static_labels {
          values = {
            job    = "faro/rum",
            source = "faro",
          }
        }
        stage.tenant { value = "frontend" }
        forward_to = [loki.write.loki.receiver]
      }
      livedebugging {
        enabled = false
      }
      // -------------------------------
      // PYROSCOPE PROFILING
      // -------------------------------
      // Receives profiles over HTTP
      pyroscope.receive_http "http" {
        http {
          listen_address = "0.0.0.0"
          listen_port = "4041"
        }
        forward_to = [pyroscope.write.pyroscope.receiver]
      }
      pyroscope.write "pyroscope" {
        endpoint {
          url            = "http://pyroscope-distributor.pyroscope.svc.cluster.local:4040"
          remote_timeout = "30s"
        }
        external_labels = {
          cluster     = sys.env("KUBE_CLUSTER_NAME"),
          environment = sys.env("ENVIRONMENT_NAME"),
          region      = sys.env("AWS_REGION"),
          cloud       = sys.env("CLOUD_PROVIDER"),
          platform    = sys.env("PLATFORM_TYPE"),
          node        = sys.env("KUBE_NODE_NAME"),
        }
      }
      pyroscope.ebpf "instance" {
        forward_to = [pyroscope.write.pyroscope.receiver]
        targets    = discovery.relabel.ebpf_targets.output
      }
      discovery.relabel "profiling_targets" {
        targets = discovery.kubernetes.pods.targets
        // pyroscope.io/scrape (apps) OR profiles.grafana.com/* (e.g. Pyroscope Helm pods self-profiling).
        rule {
          source_labels = [
            "__meta_kubernetes_pod_annotation_pyroscope_io_scrape",
            "__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_scrape",
            "__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_scrape",
          ]
          separator = ","
          regex     = "(^|,)true(,|$)"
          action    = "keep"
        }
        rule {
          action        = "drop"
          regex         = "Pending|Succeeded|Failed|Completed"
          source_labels = ["__meta_kubernetes_pod_phase"]
          }
        rule {
          source_labels = ["__address__", "__meta_kubernetes_pod_annotation_pyroscope_io_port"]
          regex         = "([^:]+)(?::\\d+)?;(.+)"
          replacement   = "$1:$2"
          target_label  = "__address__"
          action        = "replace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_pyroscope_io_profile_path"]
          regex         = "(.+)"
          replacement   = "$1"
          target_label  = "__path__"
          action        = "replace"
        }
        rule {
          source_labels = ["__path__"]
          regex         = "^$"
          replacement   = "/debug/pprof/profile"
          target_label  = "__path__"
          action        = "replace"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_node_name"]
          target_label  = "node"
          }

        rule {
          action = "labelmap"
          regex  = "__meta_kubernetes_pod_label_(.+)"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
          action        = "replace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex         = "(.+)"
          replacement   = "$1"
          target_label  = "service_name"
          action        = "replace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_uid"]
          target_label  = "pod_uid"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          target_label  = "node"
        }
        rule {
          action        = "replace"
          regex         = "(.*)@(.*)"
          replacement   = "${1}/${2}"
          separator     = "@"
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          target_label  = "service_name"
          }
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "job"
        }
        rule {
          target_label = "cluster"
          replacement  = sys.env("KUBE_CLUSTER_NAME")
        }
        rule {
          target_label = "environment"
          replacement  = sys.env("ENVIRONMENT_NAME")
        }
        rule {
          target_label = "region"
          replacement  = sys.env("AWS_REGION")
        }
        rule {
          target_label = "cloud"
          replacement  = sys.env("CLOUD_PROVIDER")
        }
        rule {
          target_label = "platform"
          replacement  = sys.env("PLATFORM_TYPE")
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_pyroscope_io_profile_path_allocs"]
          regex         = "(.+)"
          replacement   = "$1"
          target_label  = "__path__"
          action        = "replace"
        }
        rule {
          source_labels = ["__path__", "__meta_kubernetes_pod_annotation_pyroscope_io_profile_path_allocs"]
          regex         = "^/debug/pprof/profile$;(.+)"
          replacement   = "$1"
          target_label  = "__path__"
          action        = "replace"
        }
      }
      pyroscope.scrape "kubernetes_cpu_profiles" {
        targets         = discovery.relabel.profiling_targets.output
        forward_to      = [pyroscope.write.pyroscope.receiver]
        delta_profiling_duration = "55s"
        scrape_interval = "60s"
        scrape_timeout  = "45s"
        profiling_config {
          profile.fgprof {
