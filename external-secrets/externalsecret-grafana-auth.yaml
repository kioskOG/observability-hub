# Grafana datasource basic auth (monitoring namespace).
# AWS SM: observability-hub/loki-canary + mimir-remote-write → plain username/password.
# Template trim avoids trailing newlines from Secrets Manager breaking nginx basic auth.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-auth-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-auth-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        LOKI_PASSWORD: '{{ trim .LOKI_PASSWORD }}'
        MIMIR_PASSWORD: '{{ trim .MIMIR_PASSWORD }}'
        GRAFANA_OAUTH_CLIENT_SECRET: '{{ trim .GRAFANA_OAUTH_CLIENT_SECRET }}'
  data:
    - secretKey: LOKI_PASSWORD
      remoteRef:
        key: observability-hub/loki-canary
        property: password
    - secretKey: MIMIR_PASSWORD
      remoteRef:
        key: observability-hub/mimir-remote-write
        property: password
    - secretKey: GRAFANA_OAUTH_CLIENT_SECRET
      remoteRef:
        key: observability-hub/grafana-auth
        property: GRAFANA_OAUTH_CLIENT_SECRET
