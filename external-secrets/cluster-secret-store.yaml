# ClusterSecretStore → AWS Secrets Manager (IRSA on external-secrets SA).
# Make eso-apply replaces the region placeholder below from REGION / state file.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: __AWS_REGION__
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
