# Prometheus → Mimir remote_write credentials (monitoring namespace).
# AWS SM: observability-hub/mimir-remote-write → JSON {"username":"...","password":"..."}
# username/password must match a user in observability-hub/mimir-basic-auth htpasswd.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mimir-remote-write-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: mimir-remote-write-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: observability-hub/mimir-remote-write
        property: username
    - secretKey: password
      remoteRef:
        key: observability-hub/mimir-remote-write
        property: password
