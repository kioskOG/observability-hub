# Loki canary basic auth (username/password literals).
# AWS SM: observability-hub/loki-canary → JSON {"username":"...","password":"..."}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: canary-basic-auth
  namespace: loki
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: canary-basic-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: '{{ trim .username }}'
        password: '{{ trim .password }}'
  data:
    - secretKey: username
      remoteRef:
        key: observability-hub/loki-canary
        property: username
    - secretKey: password
      remoteRef:
        key: observability-hub/loki-canary
        property: password
