# Syncs Nginx gateway htpasswd for Mimir (key must be ".htpasswd").
# AWS SM: observability-hub/mimir-basic-auth → JSON {"htpasswd": "..."}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mimir-basic-auth
  namespace: mimir
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: mimir-basic-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        .htpasswd: '{{ trim .htpasswd }}'
  data:
    - secretKey: htpasswd
      remoteRef:
        key: observability-hub/mimir-basic-auth
        property: htpasswd
