# Alloy → Loki gateway + Mimir remote_write basic auth.
# AWS SM: observability-hub/alloy-remote-credentials
# JSON keys: loki_gateway_username, loki_gateway_password,
#            mimir_remote_write_username, mimir_remote_write_password
# loki_gateway_* must match a user embedded in observability-hub/loki-basic-auth htpasswd.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alloy-remote-credentials
  namespace: alloy-logs
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alloy-remote-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        loki_gateway_username: '{{ trim .loki_gateway_username }}'
        loki_gateway_password: '{{ trim .loki_gateway_password }}'
        mimir_remote_write_username: '{{ trim .mimir_remote_write_username }}'
        mimir_remote_write_password: '{{ trim .mimir_remote_write_password }}'
  data:
    - secretKey: loki_gateway_username
      remoteRef:
        key: observability-hub/alloy-remote-credentials
        property: loki_gateway_username
    - secretKey: loki_gateway_password
      remoteRef:
        key: observability-hub/alloy-remote-credentials
        property: loki_gateway_password
    - secretKey: mimir_remote_write_username
      remoteRef:
        key: observability-hub/alloy-remote-credentials
        property: mimir_remote_write_username
    - secretKey: mimir_remote_write_password
      remoteRef:
        key: observability-hub/alloy-remote-credentials
        property: mimir_remote_write_password
